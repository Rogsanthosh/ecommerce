services:
  - type: web
    name: shopzone-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shopzone-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://shopzone-frontend.onrender.com

databases:
  - name: shopzone-db
    databaseName: ecommerce_db
    user: shopzone_user
    plan: free
