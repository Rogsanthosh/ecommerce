<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>ShopZone – Premium eCommerce Store</title>
    <meta name="title" content="ShopZone – Premium eCommerce Store" />
    <meta name="description" content="Shop the latest products – shoes, electronics, clothing, accessories and more. Best prices, fast delivery." />
    <meta name="keywords" content="online shopping, shoes, electronics, clothing, accessories, ecommerce" />
    <meta name="author" content="ShopZone" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shopzone.com/" />
    <meta property="og:title" content="ShopZone – Premium eCommerce Store" />
    <meta property="og:description" content="Shop the latest products at the best prices." />
    <meta property="og:image" content="https://shopzone.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="ShopZone – Premium eCommerce Store" />
    <meta property="twitter:description" content="Shop the latest products at the best prices." />

    <!-- Performance -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8f9fa; color: #1a1a2e; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
